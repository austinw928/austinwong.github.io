<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; color: #1a1a1a; }

<body>

    <!-- Cohesive Navigation -->
    <nav class="p-6 flex justify-between items-center uppercase tracking-widest text-xs font-bold border-b border-[#ece8de]">

    <!-- Professional Footer -->
    <footer class="mt-20 py-10 border-t border-[#ece8de] text-center">
        <p class="text-[10px] uppercase tracking-[0.4em] opacity-40">© 2026 Austin Wong Zhen Xiang</p>
